name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop builds (Electron — Windows) ─────────────────────────────
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into package.json
        run: npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package (installer + portable)
        run: pnpm dist:win
        env:
          # Prevent signtool from auto-picking any machine certificate — we don't sign
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List dist artifacts
        shell: bash
        run: ls -lh dist/*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*Setup*.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: win-portable
          path: dist/*Portable*.exe

  # ── Web server Docker image ────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-desktop, build-docker]
    if: always() && needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: release-assets

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: win-portable
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Android ADB GPS Spoofer v${{ steps.version.outputs.VERSION }}

            ### Windows Downloads
            | File | Description |
            |------|-------------|
            | `*Setup*.exe` | Windows Installer (NSIS) — recommended |
            | `*Portable*.exe` | Windows Portable — no installation needed |

            ### Docker (Web Server)
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
            docker run -d --privileged -p 3000:3000 -v /dev/bus/usb:/dev/bus/usb \
              ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
