name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop builds (Electron — Windows) ─────────────────────────────
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into package.json
        run: npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Windows ADB binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/platform-tools | Out-Null
          curl.exe -fsSL https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o $env:TEMP\platform-tools.zip
          Expand-Archive -Force $env:TEMP\platform-tools.zip -DestinationPath $env:TEMP\platform-tools
          Copy-Item $env:TEMP\platform-tools\platform-tools\adb.exe resources/platform-tools\
          Copy-Item $env:TEMP\platform-tools\platform-tools\AdbWinApi.dll resources/platform-tools\
          Copy-Item $env:TEMP\platform-tools\platform-tools\AdbWinUsbApi.dll resources/platform-tools\
          & resources/platform-tools/adb.exe version

      - name: Build & package (installer + portable)
        run: pnpm dist:win
        env:
          # Prevent signtool from auto-picking any machine certificate — we don't sign
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify packaged ADB
        shell: pwsh
        run: |
          if (!(Test-Path "dist/win-unpacked/resources/platform-tools/adb.exe")) {
            throw "Missing packaged adb.exe"
          }
          if (!(Test-Path "dist/win-unpacked/resources/platform-tools/AdbWinApi.dll")) {
            throw "Missing packaged AdbWinApi.dll"
          }
          if (!(Test-Path "dist/win-unpacked/resources/platform-tools/AdbWinUsbApi.dll")) {
            throw "Missing packaged AdbWinUsbApi.dll"
          }

      - name: List dist artifacts
        shell: bash
        run: ls -lh dist/*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*Setup*.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: win-portable
          path: dist/*Portable*.exe

  # ── Desktop builds (Electron — Linux AppImage) ─────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into package.json
        run: npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Download Linux ADB binary
        run: |
          mkdir -p resources/platform-tools-linux
          curl -fsSL https://dl.google.com/android/repository/platform-tools-latest-linux.zip -o /tmp/pt.zip
          unzip -j /tmp/pt.zip platform-tools/adb -d resources/platform-tools-linux/
          chmod +x resources/platform-tools-linux/adb
          echo "ADB version: $(resources/platform-tools-linux/adb version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package (AppImage)
        run: pnpm dist:linux

      - name: List dist artifacts
        run: ls -lh dist/*.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  # ── Web server Docker image ────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-desktop, build-linux, build-docker]
    if: always() && needs.build-desktop.result == 'success' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: release-assets

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: win-portable
          path: release-assets

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Android ADB GPS Spoofer v${{ steps.version.outputs.VERSION }}

            ### Windows Downloads
            | File | Description |
            |------|-------------|
            | `*Setup*.exe` | Windows Installer (NSIS) — recommended |
            | `*Portable*.exe` | Windows Portable — no installation needed |

            ### Linux Downloads
            | File | Description |
            |------|-------------|
            | `*.AppImage` | Linux AppImage — `chmod +x *.AppImage && ./Android*.AppImage` |

            ### Docker (Web Server)
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
            docker run -d --privileged -p 3000:3000 -v /dev/bus/usb:/dev/bus/usb \
              ${{ secrets.DOCKERHUB_USERNAME }}/android-adb-gps-spoofer:${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/*
